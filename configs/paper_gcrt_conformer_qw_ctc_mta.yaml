model: gcrt_conformer
model_params:
  input_channels: 1
  hidden_dim: 384
  num_layers: 4
  num_heads: 4
  ff_dim: 1536
  downsample_factor: 4
  dropout: 0.1
  use_mta: true
  alpha_ms: 0.02
data:
  train_ctc_dir: <DATA_ROOT>/ctc_chunks/train
  read_weight_table: <READ_WEIGHT_TABLE>
optimizer: AdamW
epochs: 50
batch_size: 1
learning_rate: 0.0001
weight_decay: 0.0001
grad_clip: 1.0
seed: 1
validation_each_epoch: true
checkpoint_selection: best_validation_cer
loss:
  blank_idx: 0
  blank_penalty: 0.0
  lenreg: 0.0
